version: "3.9"

services:

  api:
    build: .
    container_name: job_platform_api
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_HOSTNAME: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: job_platform
    volumes:
      - .:/app

  db:
    image: postgres:15
    container_name: job_platform_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: